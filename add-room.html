<!DOCTYPE html>
<html>
<head>
    <title>Add Room - RoomNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>RoomNest</h1>
    <p>Add Your Room</p>
</header>

<div class="container">

<h2>Room Details</h2>

<input type="text" id="owner" placeholder="Owner Name">

<input type="text" id="location" placeholder="Room Location">

<input type="number" id="rent" placeholder="Monthly Rent">

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="file" id="image">

<button onclick="addRoom()">Add Room</button>
</div>
<script type="module" src="firebase.js"></script>
</body>
</html>
