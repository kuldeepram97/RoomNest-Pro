<!DOCTYPE html>
<html>
<head>
    <title>Add Room - RoomNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>RoomNest</h1>
    <p>Add Your Room</p>
</header>

<div class="container">

<h2>Room Details</h2>

<input type="text" id="owner" placeholder="Owner Name">

<input type="text" id="location" placeholder="Room Location">

<input type="number" id="rent" placeholder="Monthly Rent">

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="file" id="image">

<button onclick="addRoom()">Add Room</button>
</div>
<script>
function addRoom(){

let owner = document.getElementById("owner").value;
let location = document.getElementById("location").value;
let rent = document.getElementById("rent").value;
let mobile = document.getElementById("mobile").value;

if(owner=="" || location=="" || rent=="" || mobile==""){
    alert("Please fill all details");
}
else{
    alert("Room Added Successfully");
}

}
</script>

<script src="js/add-room.js" type="module"></script>
alert("Room Added Successfully");

}
</script> 
</body>
</html>
